app:
  description: '《Token-Level Collaborative Reasoning for Parallel Multi-Models》
    的 DuetNet 中文复现 DSL。

    本版本把原先隐藏在 parallel-ensemble 内部的 token 级自回归过程显式画成
    Dify Loop：每轮只生成 1 个 token，循环执行联合 Top-K/Top-P 截断、候选
    token 并集聚合、累计 logit Top-T 选择，并把选中的 token 追加回共享上下文。

    工作流在进入循环前使用 data-loader 节点从本地 C-Eval JSONL 数据集读取样本，
    再将样本问题转换为所有模型共享的初始 prompt。循环在遇到 EOS/空 token 或达到
    512 个 token 后结束。'
  icon: 🔁
  icon_background: '#DCE5FF'
  mode: workflow
  name: DuetNet 显式循环 + 数据加载
  use_icon_as_answer_icon: false
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: data-loader
      id: start-to-sample-loader
      source: start_node
      sourceHandle: source
      target: sample_loader
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: data-loader
        targetType: code
      id: sample-loader-to-prepare-sample
      source: sample_loader
      sourceHandle: source
      target: prepare_sample
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: loop
      id: prepare-sample-to-duet-loop
      source: prepare_sample
      sourceHandle: source
      target: duet_loop
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: loop-start
        targetType: token-model-source
      id: duet-loop-start-to-q1
      source: duet_loop_start
      sourceHandle: source
      target: q1_source
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: loop-start
        targetType: token-model-source
      id: duet-loop-start-to-q2
      source: duet_loop_start
      sourceHandle: source
      target: q2_source
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: loop-start
        targetType: token-model-source
      id: duet-loop-start-to-g4
      source: duet_loop_start
      sourceHandle: source
      target: g4_source
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: loop-start
        targetType: token-model-source
      id: duet-loop-start-to-L3
      source: duet_loop_start
      sourceHandle: source
      target: L3_source
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: token-model-source
        targetType: parallel-ensemble
      id: q1-to-token-vote
      source: q1_source
      sourceHandle: source
      target: token_vote
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: token-model-source
        targetType: parallel-ensemble
      id: q2-to-token-vote
      source: q2_source
      sourceHandle: source
      target: token_vote
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: token-model-source
        targetType: parallel-ensemble
      id: g4-to-token-vote
      source: g4_source
      sourceHandle: source
      target: token_vote
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: token-model-source
        targetType: parallel-ensemble
      id: L3-to-token-vote
      source: L3_source
      sourceHandle: source
      target: token_vote
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: parallel-ensemble
        targetType: code
      id: token-vote-to-advance-state
      source: token_vote
      sourceHandle: source
      target: advance_state
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: true
        loop_id: duet_loop
        sourceType: code
        targetType: assigner
      id: advance-state-to-update-loop-vars
      source: advance_state
      sourceHandle: source
      target: update_loop_vars
      targetHandle: target
      type: custom
      zIndex: 1002
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: loop
        targetType: end
      id: duet-loop-to-end
      source: duet_loop
      sourceHandle: source
      target: end_node
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: 工作流入口。本版本默认从数据加载器读取评测样本，因此不需要用户手动输入问题。
        selected: false
        title: 开始
        type: start
        variables: []
      height: 74
      id: start_node
      position:
        x: 30
        y: 420
      positionAbsolute:
        x: 30
        y: 420
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 从本地 C-Eval JSONL 文件读取一个标准化评测样本，输出 items、questions、answers 和元数据。
        loader_name: jsonl_file
        loader_config:
          path: /home/xianghe/temp/dify/dev/modelnet/datasets/c_eval.jsonl
          dataset_name: C-Eval
          split: validation-sample
          encoding: utf-8
          id_key: id
          question_key: question
          answer_key: answer
          metadata_keys:
          - subject
          - extractor
          max_rows: 50
        limit: 1
        offset: 0
        seed: 42
        selected: false
        shuffle: false
        title: 数据集加载：读取 C-Eval 样本
        type: data-loader
      height: 142
      id: sample_loader
      position:
        x: 334
        y: 386
      positionAbsolute:
        x: 334
        y: 386
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          def main(items: list) -> dict:
              if not items:
                  return {
                      "prompt": "",
                      "sample_id": "",
                      "gold_answer": "",
                  }

              item = items[0] or {}
              data = item.get("data") or {}
              question = item.get("question") or data.get("question") or ""
              answer = item.get("answer") or data.get("answer") or ""
              sample_id = item.get("id") or data.get("id") or ""
              return {
                  "prompt": str(question),
                  "sample_id": str(sample_id),
                  "gold_answer": str(answer),
              }
        code_language: python3
        desc: 将数据加载器输出的第一条样本整理成 DuetNet 共享输入 omega，并保留样本 ID 与标准答案。
        outputs:
          gold_answer:
            children: null
            type: string
          prompt:
            children: null
            type: string
          sample_id:
            children: null
            type: string
        selected: false
        title: 样本整理：生成共享问题
        type: code
        variables:
        - value_selector:
          - sample_loader
          - items
          variable: items
      height: 106
      id: prepare_sample
      position:
        x: 638
        y: 404
      positionAbsolute:
        x: 638
        y: 404
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        break_conditions:
        - comparison_operator: is
          id: break-on-eos
          value: true
          varType: boolean
          variable_selector:
          - duet_loop
          - is_done
        - comparison_operator: ≥
          id: break-on-max-step
          value: '512'
          varType: number
          variable_selector:
          - duet_loop
          - step
        desc: 显式 token 级循环。每轮调用四个模型源，DuetNet 聚合器只选择下一个 token，并更新共享上下文。
        error_handle_mode: terminated
        height: 760
        logical_operator: or
        loop_count: 512
        loop_variables:
        - id: loop-var-current-prompt
          label: current_prompt
          value:
          - prepare_sample
          - prompt
          value_type: variable
          var_type: string
        - id: loop-var-generated-text
          label: generated_text
          value: ''
          value_type: constant
          var_type: string
        - id: loop-var-step
          label: step
          value: '0'
          value_type: constant
          var_type: number
        - id: loop-var-is-done
          label: is_done
          value: false
          value_type: constant
          var_type: boolean
        selected: false
        start_node_id: duet_loop_start
        title: 循环：逐 token 协作推理
        type: loop
        width: 1448
      height: 760
      id: duet_loop
      position:
        x: 942
        y: 90
      positionAbsolute:
        x: 942
        y: 90
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 1448
      zIndex: 1
    - data:
        desc: 循环起点，每次迭代都会使用最新 current_prompt 触发四个模型源。
        isInLoop: true
        selected: false
        title: ''
        type: loop-start
      draggable: false
      height: 48
      id: duet_loop_start
      parentId: duet_loop
      position:
        x: 58
        y: 348
      positionAbsolute:
        x: 1000
        y: 438
