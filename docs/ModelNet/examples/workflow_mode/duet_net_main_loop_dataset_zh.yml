      targetPosition: left
      type: custom-loop-start
      width: 44
      zIndex: 1002
    - data:
        desc: 模型 m=1，q1，对应 model_alias=29。读取当前共享上下文并产出 ModelInvocationSpec。
        extra: {}
        inline_spec: null
