          top_p: null
        selected: false
        title: 模型源 m=2：q2
        type: token-model-source
      height: 130
      id: q2_source
      parentId: duet_loop
      position:
        x: 162
        y: 244
      positionAbsolute:
        x: 1104
        y: 334
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        desc: 模型 m=3，g4，对应 model_alias=6。读取当前共享上下文并产出 ModelInvocationSpec。
        extra: {}
        inline_spec: null
        isInLoop: true
        loop_id: duet_loop
        model_alias: '6'
        prompt_template: '{{#duet_loop.current_prompt#}}'
        raw_completion: false
        sampling_params:
          max_tokens: 1024
          seed: null
          stop: []
          temperature: 0.7
          top_k: 10
          top_p: null
        selected: false
        title: 模型源 m=3：g4
        type: token-model-source
      height: 130
      id: g4_source
      parentId: duet_loop
      position:
        x: 162
        y: 426
      positionAbsolute:
        x: 1104
        y: 516
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        desc: 模型 m=4，L3，对应 model_alias=2。读取当前共享上下文并产出 ModelInvocationSpec。
        extra: {}
        inline_spec: null
        isInLoop: true
        loop_id: duet_loop
        model_alias: '2'
        prompt_template: '{{#duet_loop.current_prompt#}}'
        raw_completion: false
        sampling_params:
          max_tokens: 1024
          seed: null
          stop: []
          temperature: 0.7
          top_k: 10
          top_p: null
        selected: false
        title: 模型源 m=4：L3
        type: token-model-source
      height: 130
      id: L3_source
      parentId: duet_loop
      position:
        x: 162
        y: 608
      positionAbsolute:
        x: 1104
        y: 698
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        desc: DuetNet 单 token 聚合步骤：联合 tau_K/tau_P 截断候选集合，按原始 logit 累计分数聚合，并用 Top-T 选出下一个 token。
        ensemble:
          aggregator_config:
            seed: null
            tau_k: 10
            tau_p: 0.75
            top_t: 1
            use_weights: false
          aggregator_name: duet_net
          diagnostics:
            enable_trace_stream: false
            include_aggregator_reasoning: true
            include_logits: true
            include_model_outputs: false
            include_per_backend_errors: true
            include_response_timings: true
            include_think_trace: false
            include_token_candidates: true
            max_trace_tokens: 512
            storage: metadata
          runner_config:
            enable_think: false
            max_len: 1
          runner_name: token_step
          token_sources:
          - extra: {}
            fallback_weight: null
            source_id: q1
            spec_selector:
            - q1_source
            - spec
            top_k_override: null
            weight: 1.0
          - extra: {}
            fallback_weight: null
            source_id: q2
            spec_selector:
            - q2_source
            - spec
            top_k_override: null
            weight: 1.0
          - extra: {}
            fallback_weight: null
            source_id: g4
            spec_selector:
            - g4_source
            - spec
            top_k_override: null
            weight: 1.0
          - extra: {}
            fallback_weight: null
            source_id: L3
            spec_selector:
            - L3_source
            - spec
            top_k_override: null
            weight: 1.0
        isInLoop: true
        loop_id: duet_loop
        selected: false
        title: DuetNet 聚合：选择下一个 token
        type: parallel-ensemble
      height: 236
      id: token_vote
      parentId: duet_loop
      position:
        x: 500
        y: 262
      positionAbsolute:
        x: 1442
        y: 352
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        code: |
          def main(current_prompt: str, generated_text: str, selected_token: str) -> dict:
              token = selected_token or ""
              eos_tokens = {"<end>", "</s>", "<|endoftext|>", "<|im_end|>"}
              normalized = token.strip()
              is_done = normalized in eos_tokens or token == ""

              if is_done:
                  return {
                      "next_prompt": current_prompt or "",
                      "next_generated_text": generated_text or "",
                      "is_done": True,
                  }

              next_generated_text = f"{generated_text or ''}{token}"
              return {
                  "next_prompt": f"{current_prompt or ''}{token}",
                  "next_generated_text": next_generated_text,
                  "is_done": False,
              }
        code_language: python3
        desc: 将本轮选中的 token 追加到生成文本和下一轮共享 prompt；若命中结束 token，则设置停止标记。
        isInLoop: true
        loop_id: duet_loop
        outputs:
          is_done:
            children: null
            type: boolean
          next_generated_text:
            children: null
            type: string
          next_prompt:
            children: null
            type: string
        selected: false
        title: 状态更新：追加 token
        type: code
        variables:
        - value_selector:
          - duet_loop
          - current_prompt
          variable: current_prompt
        - value_selector:
          - duet_loop
          - generated_text
          variable: generated_text
        - value_selector:
          - token_vote
          - text
          variable: selected_token
      height: 130
      id: advance_state
      parentId: duet_loop
      position:
        x: 820
        y: 315
      positionAbsolute:
        x: 1762
        y: 405
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        desc: 将状态更新节点产出的 next_prompt、next_generated_text、is_done 写回 Loop 变量，并把 step 加 1。
        isInIteration: false
        isInLoop: true
        items:
        - input_type: variable
          operation: over-write
          value:
          - advance_state
          - next_prompt
          variable_selector:
          - duet_loop
          - current_prompt
          write_mode: over-write
        - input_type: variable
          operation: over-write
          value:
          - advance_state
          - next_generated_text
          variable_selector:
          - duet_loop
          - generated_text
          write_mode: over-write
        - input_type: variable
          operation: over-write
          value:
          - advance_state
          - is_done
          variable_selector:
          - duet_loop
          - is_done
          write_mode: over-write
        - input_type: constant
          operation: +=
          value: 1
          variable_selector:
          - duet_loop
          - step
          write_mode: over-write
        loop_id: duet_loop
        selected: false
        title: 写回循环变量
        type: assigner
        version: '2'
      height: 142
      id: update_loop_vars
      parentId: duet_loop
      position:
        x: 1138
        y: 310
      positionAbsolute:
        x: 2080
        y: 400
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        desc: 输出最终协作生成文本、循环步数、样本 ID 和标准答案，便于后续评测准确率。
        outputs:
        - value_selector:
          - prepare_sample
          - sample_id
          value_type: string
          variable: sample_id
        - value_selector:
          - sample_loader
          - dataset
          value_type: string
          variable: dataset
        - value_selector:
          - prepare_sample
          - gold_answer
          value_type: string
          variable: gold_answer
        - value_selector:
          - duet_loop
          - generated_text
          value_type: string
          variable: answer
        - value_selector:
          - duet_loop
          - step
          value_type: number
          variable: generated_tokens
        selected: false
        title: 结束：输出评测结果
        type: end
      height: 142
      id: end_node
      position:
        x: 2450
        y: 404
      positionAbsolute:
        x: 2450
        y: 404
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
