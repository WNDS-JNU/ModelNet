        x: 638
        y: 260
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 'llama_precise: model_alias=2, temperature=0.2, top_k=10; 输出 ModelInvocationSpec。'
        extra: {}
        inline_spec: null
        model_alias: '2'
        prompt_template: '请给出严谨、可核验、尽量简短的回答。


          问题：{{#start_node.question#}}'
        raw_completion: false
        expose_raw_logits: true
        sampling_params:
          max_tokens: 1024
          seed: null
          stop: []
          temperature: 0.2
          top_k: 10
          top_p: null
        title: Token Source (llama_precise)
        selected: false
        type: token-model-source
      height: 130
      id: precise_llama
      position:
        x: 638
        y: 416
      positionAbsolute:
        x: 638
        y: 416
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 使用 DuetNet 的 tau_K/tau_P 截断与 raw-logit 累加，适合数学、选择题、事实核验类任务。
        ensemble:
          aggregator_config:
            seed: null
            tau_k: 10
            tau_p: 0.65
            top_t: 1
            use_weights: false
          aggregator_name: duet_net
          diagnostics:
            enable_trace_stream: false
            include_aggregator_reasoning: true
            include_logits: true
            include_model_outputs: false
            include_per_backend_errors: true
            include_response_timings: true
            include_think_trace: false
            include_token_candidates: true
            max_trace_tokens: 512
            storage: metadata
          runner_config:
            enable_think: false
            max_len: 256
          runner_name: token_step
          token_sources:
          - extra: {}
            fallback_weight: null
            source_id: qwen_precise
            spec_selector:
            - precise_qwen
            - spec
            top_k_override: null
            weight: 1.0
          - extra: {}
            fallback_weight: null
            source_id: glm_precise
            spec_selector:
            - precise_glm
            - spec
            top_k_override: null
            weight: 1.0
          - extra: {}
            fallback_weight: null
            source_id: llama_precise
            spec_selector:
            - precise_llama
            - spec
            top_k_override: null
            weight: 1.0
        title: 精确推理：DuetNet
        selected: false
        type: parallel-ensemble
      height: 200
      id: precise_ensemble
      position:
        x: 942
        y: 256
      positionAbsolute:
        x: 942
        y: 256
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 输出 DuetNet 分支答案。
        outputs:
        - value_selector:
          - precise_ensemble
          - text
          value_type: string
          variable: answer
        - value_selector:
          - precise_ensemble
          - tokens_count
          value_type: number
          variable: tokens_count
        title: 结束：精确答案
        selected: false
        type: end
      height: 130
