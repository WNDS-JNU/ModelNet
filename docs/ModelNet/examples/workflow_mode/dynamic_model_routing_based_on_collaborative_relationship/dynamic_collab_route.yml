      - data:
          code: >
            def main(results: list, dataset_total: int, loaded_count: int, next_offset: int) ->
            dict:
                rows = results or []
                total_evaluated = len(rows)
                correct_count = 0
                total_latency_ms = 0
                for row in rows:
                    if isinstance(row, dict):
                        if row.get("is_correct"):
                            correct_count += 1
                        total_latency_ms += int(row.get("route_elapsed_ms") or 0)
                incorrect_count = total_evaluated - correct_count
                accuracy = correct_count / total_evaluated if total_evaluated else 0.0
                avg_latency_ms = total_latency_ms / total_evaluated if total_evaluated else 0.0
                return {
                    "total_evaluated": total_evaluated,
                    "correct_count": correct_count,
                    "incorrect_count": incorrect_count,
                    "accuracy": accuracy,
                    "accuracy_percent": accuracy * 100.0,
                    "avg_latency_ms": avg_latency_ms,
                    "dataset_total": dataset_total or 0,
                    "loaded_count": loaded_count or total_evaluated,
                    "next_offset": next_offset or 0,
                }
          code_language: python3
          desc: 汇总 50 条样本评测结果，计算正确数、错误数、准确率和平均路由耗时。
          outputs:
            accuracy:
              children: null
              type: number
            accuracy_percent:
              children: null
              type: number
            avg_latency_ms:
              children: null
              type: number
            correct_count:
