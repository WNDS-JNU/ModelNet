      - data:
          code: |
            import re


            def _last_abcd(text: str) -> str:
                cleaned = (text or "").upper()
                matches = re.findall(r"(?<![A-Z])([ABCD])(?![A-Z])", cleaned)
                if matches:
                    return matches[-1]
                for char in reversed(cleaned):
                    if char in {"A", "B", "C", "D"}:
                        return char
                return ""


            def _last_bool(text: str) -> str:
                cleaned = (text or "").strip().lower()
                matches = re.findall(r"\b(true|false|yes|no)\b", cleaned)
                if not matches:
                    return ""
                value = matches[-1]
                if value == "yes":
                    return "true"
                if value == "no":
                    return "false"
                return value


            def _normalize(text: str, extractor: str) -> str:
                strategy = (extractor or "").strip().lower()
                if strategy == "last_bool":
                    return _last_bool(text)
                return _last_abcd(text)


            def main(
                raw_answer: str,
                gold_answer: str,
                extractor: str,
                sample_id: str,
                dataset: str,
                split: str,
                subject: str,
                source_path: str,
                route_elapsed_ms: int,
                route_tokens_count: int,
                route_trace: dict,
            ) -> dict:
                prediction = _normalize(raw_answer or "", extractor or "last_abcd")
                normalized_gold = _normalize(gold_answer or "", extractor or "last_abcd")
                is_correct = bool(prediction) and prediction == normalized_gold
                summary = (route_trace or {}).get("summary") or {}
                result = {
                    "sample_id": sample_id or "",
                    "dataset": dataset or "",
                    "split": split or "",
                    "subject": subject or "",
                    "extractor": extractor or "last_abcd",
                    "source_path": source_path or "",
                    "gold_answer": gold_answer or "",
                    "normalized_gold": normalized_gold,
                    "prediction": prediction,
                    "is_correct": is_correct,
                    "raw_answer": raw_answer or "",
                    "route_elapsed_ms": route_elapsed_ms or 0,
                    "route_tokens_count": route_tokens_count or 0,
                    "route": summary.get("route") or [],
                    "stopped_by": summary.get("stopped_by") or "",
                    "hops_count": summary.get("hops_count") or 0,
                }
                return {
                    "raw_answer": result["raw_answer"],
                    "prediction": prediction,
                    "normalized_gold": normalized_gold,
                    "is_correct": is_correct,
                    "result": result,
                }
          code_language: python3
          desc: 根据样本 extractor 字段从动态协作路由最终回答中抽取预测答案，并输出当前样本评测对象。
          outputs:
            is_correct:
              children: null
              type: boolean
            normalized_gold:
              children: null
              type: string
            prediction:
              children: null
              type: string
            raw_answer:
              children: null
              type: string
            result:
              children: null
              type: object
          selected: false
