app:
  description: >-
    基于现有 ModelNet 注册表和 parallel-ensemble SPI 复现动态协作模型路由方法。


    本版本内置 data-loader，从本地 C-Eval JSONL 数据集可复现随机抽取 50 条样本，并用 Iteration
    逐条运行动态协作路由。


    每条样本内部复用 Q/D/Y 三个 token-model-source：先由初始模型 D 生成回答，再按协作关系图让候选模型判断是否认可，出现不认可时由被选中的模型优化回答。


    Iteration 外汇总逐样本预测结果，输出 results、correct_count、total_evaluated 和 accuracy，可直接用 DSL 完成一次评测实验。
  icon: "\U0001F500"
  icon_background: '#DCE5FF'
  mode: workflow
  name: 动态协作路由：数据集评测
  use_icon_as_answer_icon: false
kind: app
version: 0.3.1
