    - id: prepare_sample
      type: custom
      data:
        code: |
          def main(item: dict, dataset: str, split: str, loader_metadata: dict) -> dict:
              item = item or {}
              data = item.get("data") or {}
              metadata = item.get("metadata") or {}
              question = item.get("question") or data.get("question") or ""
              answer = item.get("answer") or data.get("answer") or ""
              sample_id = item.get("id") or data.get("id") or ""
              subject = metadata.get("subject") or data.get("subject") or ""
              extractor = metadata.get("extractor") or data.get("extractor") or "last_abcd"
              return {
                  "prompt": str(question),
                  "sample_id": str(sample_id),
                  "gold_answer": str(answer),
                  "subject": str(subject),
                  "extractor": str(extractor),
                  "dataset": dataset or "",
                  "split": split or "",
                  "source_path": (loader_metadata or {}).get("path", ""),
                  "sample_metadata": metadata,
              }
