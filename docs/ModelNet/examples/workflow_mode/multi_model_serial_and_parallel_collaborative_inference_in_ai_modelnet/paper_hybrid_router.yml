app:
  description: AI-ModelNet 混合推理总入口。必填输入 `path` 选择六条 S2P/P2S token 级融合路径之一；工作流会加载本地 C-Eval JSONL，逐样本循环运行
    所选路径并输出 accuracy、correct_count 和逐样本 results。
  icon: 🎼
  icon_background: '#DCE5FF'
  mode: workflow
  name: AI-ModelNet 混合路径总入口 (workflow)
  use_icon_as_answer_icon: false
kind: app
version: 0.3.1
workflow:
