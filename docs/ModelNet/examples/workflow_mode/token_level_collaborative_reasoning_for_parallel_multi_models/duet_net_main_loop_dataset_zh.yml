app:
  description: >-
    《Token-Level Collaborative Reasoning for Parallel Multi-Models》 的 DuetNet 中文复现 DSL。


    本版本使用 data-loader 从本地 C-Eval JSONL 数据集可复现随机抽取 100 条样本，再用外层 Iteration 遍历样本。


    每个样本内部保留四个 token-model-source 节点，用标准节点面板分别产出四个 ModelInvocationSpec；不再使用外层 Dify token
    Loop。parallel-ensemble 的 token_step runner 在节点内部完成 token 级自回归：prompt -> token1 -> token2 -> ...
    -> EOS/max_len。


    评测汇总在 Iteration 外一次性完成，输出 results、correct_count、total_evaluated 和 accuracy。
  icon: 🔁
  icon_background: '#DCE5FF'
  mode: workflow
  name: DuetNet token_step + token-source + 100题抽样评测
  use_icon_as_answer_icon: false
kind: app
version: 0.3.1
