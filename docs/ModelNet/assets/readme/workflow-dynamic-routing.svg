<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" role="img" aria-labelledby="title desc">
  <title id="title">动态路由协作工作流示意图</title>
  <desc id="desc">根据任务特征、模型协作关系和运行状态动态选择模型链路，并输出答案与路由轨迹。</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#E7EEF6" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="980" height="380" rx="18" fill="#F8FAFC"/>
  <rect width="980" height="380" rx="18" fill="url(#grid)" opacity="0.85"/>
  <text x="40" y="48" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">动态路由协作</text>
  <text x="40" y="75" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#64748B">根据任务、协作关系和运行状态，动态形成模型链路，而不是把模型调用顺序写死。</text>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="44" y="148" width="152" height="84" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="120" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">任务输入</text>
    <text x="120" y="202" text-anchor="middle" font-size="12" fill="#64748B">question / sample</text>
  </g>

  <path d="M196 190 C236 190 248 190 286 190" fill="none" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="286" y="104" width="226" height="172" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="399" y="133" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">协作关系图</text>
    <line x1="366" y1="184" x2="428" y2="154" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="366" y1="184" x2="432" y2="218" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="428" y1="154" x2="432" y2="218" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="366" cy="184" r="28" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
    <text x="366" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">D</text>
    <circle cx="428" cy="154" r="26" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="428" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Q</text>
    <circle cx="432" cy="218" r="26" fill="#CCFBF1" stroke="#14B8A6" stroke-width="2"/>
    <text x="432" y="224" text-anchor="middle" font-size="15" font-weight="700" fill="#0F766E">Y</text>
    <text x="399" y="258" text-anchor="middle" font-size="12" fill="#64748B">能力 / 认可度 / 状态</text>
  </g>

  <path d="M512 190 C548 190 556 190 590 190" fill="none" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="590" y="126" width="186" height="128" rx="10" fill="#0F172A"/>
    <text x="683" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#F8FAFC">dynamic_collab_route</text>
    <rect x="618" y="184" width="130" height="30" rx="7" fill="#CCFBF1"/>
    <text x="683" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">选择 D → Y 链路</text>
    <text x="683" y="235" text-anchor="middle" font-size="12" fill="#CBD5E1">输出 route trace</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="2.5">
    <path d="M776 170 C818 134 838 122 878 122" stroke="#94A3B8" stroke-dasharray="5 7" marker-end="url(#arrow-muted)"/>
    <path d="M776 190 C820 190 838 190 878 190" stroke="#0F766E" marker-end="url(#arrow)"/>
    <path d="M776 210 C818 246 838 258 878 258" stroke="#94A3B8" stroke-dasharray="5 7" marker-end="url(#arrow-muted)"/>
  </g>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="878" y="93" width="70" height="58" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="913" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#94A3B8">Q</text>
    <rect x="878" y="161" width="70" height="58" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="913" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">D → Y</text>
    <rect x="878" y="229" width="70" height="58" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="913" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="#94A3B8">Y</text>
  </g>
</svg>
