<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 380" role="img" aria-labelledby="title desc">
  <title id="title">Token 级协作工作流示意图</title>
  <desc id="desc">Start 或 Data Loader 将问题送入多个 Token Model Source，Parallel Ensemble 在解码过程中融合 token 决策。</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#E7EEF6" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-hot" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7C3AED"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="980" height="380" rx="18" fill="#F8FAFC"/>
  <rect width="980" height="380" rx="18" fill="url(#grid)" opacity="0.85"/>
  <text x="40" y="48" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Token 级协作</text>
  <text x="40" y="75" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#64748B">多个模型在解码过程中共享候选 token，通过 duet_net / token_step runner 融合下一步输出。</text>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="42" y="154" width="154" height="78" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="119" y="181" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Start / Data Loader</text>
    <text x="119" y="204" text-anchor="middle" font-size="12" fill="#64748B">question / sample</text>
  </g>

  <g stroke="#475569" stroke-width="2.2" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M196 193 C235 193 236 118 282 118"/>
    <path d="M196 193 C238 193 236 170 282 170"/>
    <path d="M196 193 C238 193 236 222 282 222"/>
    <path d="M196 193 C235 193 236 274 282 274"/>
  </g>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="282" y="92" width="182" height="46" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="306" y="121" font-size="13" font-weight="700" fill="#1D4ED8">q1 Token Source</text>
    <rect x="282" y="144" width="182" height="46" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
    <text x="306" y="173" font-size="13" font-weight="700" fill="#6D28D9">q2 Token Source</text>
    <rect x="282" y="196" width="182" height="46" rx="8" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="306" y="225" font-size="13" font-weight="700" fill="#0F766E">g4 Token Source</text>
    <rect x="282" y="248" width="182" height="46" rx="8" fill="#FFFFFF" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="306" y="277" font-size="13" font-weight="700" fill="#C2410C">L3 Token Source</text>
  </g>

  <g stroke="#475569" stroke-width="2.2" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M464 115 C520 115 522 154 568 154"/>
    <path d="M464 167 C516 167 524 177 568 177"/>
    <path d="M464 219 C516 219 524 201 568 201"/>
    <path d="M464 271 C522 271 520 224 568 224"/>
  </g>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="568" y="118" width="248" height="142" rx="10" fill="#111827"/>
    <text x="692" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#F8FAFC">Parallel Ensemble</text>
    <text x="692" y="170" text-anchor="middle" font-size="12" fill="#C4B5FD">runner: token_step / duet_net</text>
    <rect x="592" y="192" width="44" height="30" rx="7" fill="#DBEAFE"/>
    <text x="614" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">t1</text>
    <rect x="648" y="192" width="44" height="30" rx="7" fill="#EDE9FE"/>
    <text x="670" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">t2</text>
    <rect x="704" y="192" width="44" height="30" rx="7" fill="#CCFBF1"/>
    <text x="726" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">t3</text>
    <rect x="760" y="192" width="32" height="30" rx="7" fill="#FEF3C7"/>
    <text x="776" y="212" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">...</text>
  </g>

  <path d="M816 189 C850 189 850 189 880 189" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-hot)"/>

  <g font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" filter="url(#soft-shadow)">
    <rect x="880" y="145" width="66" height="88" rx="10" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
    <text x="913" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Answer</text>
    <text x="913" y="203" text-anchor="middle" font-size="12" fill="#64748B">+ trace</text>
  </g>
</svg>
