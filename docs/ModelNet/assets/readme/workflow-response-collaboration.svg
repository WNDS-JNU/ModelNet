<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">响应级协作工作流示意图</title>
  <desc id="desc">多个模型、工具或 Agent 先生成完整答案，再交给 Response Aggregator 汇总为最终输出。</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#E6EDF5" stroke-width="1"/>
    </pattern>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0F766E"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="980" height="360" rx="18" fill="#F8FAFC"/>
  <rect width="980" height="360" rx="18" fill="url(#grid)" opacity="0.85"/>
  <text x="40" y="48" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="700" fill="#0F172A">响应级协作</text>
  <text x="40" y="75" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif" font-size="14" fill="#64748B">多路完整答案先独立生成，再由 Response Aggregator 做投票、互评或综合。</text>

  <g filter="url(#soft-shadow)" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif">
    <rect x="48" y="116" width="190" height="56" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="72" y="140" font-size="14" font-weight="700" fill="#1D4ED8">LLM A</text>
    <text x="72" y="158" font-size="12" fill="#64748B">候选答案 / 解释链</text>

    <rect x="48" y="202" width="190" height="56" rx="8" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="72" y="226" font-size="14" font-weight="700" fill="#0F766E">HTTP / Code Tool</text>
    <text x="72" y="244" font-size="12" fill="#64748B">外部证据 / 结构化结果</text>

    <rect x="48" y="288" width="190" height="48" rx="8" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="72" y="311" font-size="14" font-weight="700" fill="#C2410C">Agent / Reviewer</text>
    <text x="72" y="329" font-size="12" fill="#64748B">角色化判断</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="2.5">
    <path d="M238 144 C300 144 318 178 366 178" stroke="#2563EB" marker-end="url(#arrow-blue)"/>
    <path d="M238 230 C296 230 320 206 366 206" stroke="#0F766E" marker-end="url(#arrow-teal)"/>
    <path d="M238 312 C306 312 318 238 366 234" stroke="#EA580C" marker-end="url(#arrow-blue)"/>
  </g>

  <g filter="url(#soft-shadow)" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif">
    <rect x="366" y="122" width="270" height="154" rx="10" fill="#0F172A"/>
    <rect x="386" y="145" width="230" height="38" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1"/>
    <text x="501" y="169" text-anchor="middle" font-size="15" font-weight="700" fill="#E0F2FE">Response Aggregator</text>
    <rect x="391" y="202" width="68" height="38" rx="8" fill="#DBEAFE"/>
    <text x="425" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">投票</text>
    <rect x="474" y="202" width="68" height="38" rx="8" fill="#CCFBF1"/>
    <text x="508" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">互评</text>
    <rect x="557" y="202" width="68" height="38" rx="8" fill="#FEF3C7"/>
    <text x="591" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">综合</text>
  </g>

  <path d="M636 199 C690 199 706 199 752 199" fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-teal)"/>

  <g filter="url(#soft-shadow)" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif">
    <rect x="752" y="140" width="176" height="118" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="840" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">最终答案</text>
    <path d="M786 196 H896" stroke="#D1FAE5" stroke-width="8" stroke-linecap="round"/>
    <path d="M786 221 H874" stroke="#DBEAFE" stroke-width="8" stroke-linecap="round"/>
    <text x="840" y="246" text-anchor="middle" font-size="12" fill="#64748B">Answer + Trace</text>
  </g>
</svg>
