# Sample config for the AI-ModelNet hybrid-path reproduction.
# See docs/ModelNet/research/UNDERGRAD_RESEARCH_PLAYBOOK.md section 6 and
# docs/ModelNet/research/PAPER_REPRODUCTION_PLAN.md for the design.
#
# Copy to eval.paper.yaml (gitignored), import paper_hybrid_router.yml into
# Dify Studio, paste the router app's API key below, then:
#
#   uv run --project api python dev/modelnet/duet_net_eval.py \
#       --config dev/modelnet/eval.paper.yaml
#
# Smoke a small subset before the 1800-call full six-path run:
#
#   uv run --project api python dev/modelnet/duet_net_eval.py \
#       --config dev/modelnet/eval.paper.yaml \
#       --datasets gsm8k --n 5

base_url: http://localhost:5001/v1
user: paper-reproduction
response_mode: blocking
request_timeout_s: 600

# workflow keys
# 3 paper-model roles:
#   Q = Qwen2.5-7B (alias 5)
#   D = Qwen3-8B-BF16 thinking-model stand-in (alias 22)
#   Y = glm-4-9b-chat (alias 6, replacing the unavailable Yi-1.5-9B)
#
# Six hybrid paths total: S2P 3 + P2S 3. Import only paper_hybrid_router.yml,
# then reuse the same router API key under six labels with a static path input.
workflow_keys:
  paper_s2p_Q_DY:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_s2p_Q_DY }   # Q -> [D, Y]
  paper_s2p_D_QY:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_s2p_D_QY }   # D -> [Q, Y]
  paper_s2p_Y_QD:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_s2p_Y_QD }   # Y -> [Q, D]
  paper_p2s_QD_Y:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_p2s_QD_Y }   # [Q, D] -> Y
  paper_p2s_QY_D:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_p2s_QY_D }   # [Q, Y] -> D
  paper_p2s_DY_Q:
    api_key: app-ROUTER_KEY_HERE
    inputs: { path: paper_p2s_DY_Q }   # [D, Y] -> Q

# datasets
# Paper section 4.1 randomly samples 100 questions from each dataset.
datasets:
  gsm8k:
    n: 100
    seed: 42
  c_eval:
    n: 100
    seed: 42
    # The paper does not name the C-Eval subjects it samples; expand
    # this list to track whichever slice you reproduce. The single
    # ``computer_network`` subject reproduces DuetNet's slice; add
    # broader subjects for AI-ModelNet's 100-question random sample.
    subjects:
      - computer_network
      # - high_school_mathematics
      # - high_school_physics
      # - high_school_chemistry
      # - chinese_language_and_literature
      # - accountant
  math:
    n: 100
    seed: 42

checkpoint_path: dev/modelnet/checkpoints/paper.json
report_path:     dev/modelnet/reports/paper.json
